    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                primary: '#97A87A',
                secondary: '#A8BBA3',
                cream: '#FCF9EA',
                orange: '#FFA239',
                dark: '#2D3A26',
              }
            },
            fontFamily: {
              sans: ['"Red Hat Text"', '"Lato"', 'sans-serif'],
              display: ['"Red Hat Display"', 'sans-serif'],
              hand: ['"Caveat"', 'cursive'],
              stamp: ['"Black Ops One"', 'cursive'],
            },
            animation: {
              'fade-up': 'fadeUp 0.8s ease-out forwards',
              'wiggle-slow': 'wiggle 3s ease-in-out infinite',
              'writing': 'typing 4s steps(30, end) infinite', 
              'marquee': 'marquee 40s linear infinite',
              'marquee-reverse': 'marqueeReverse 40s linear infinite',
              'marquee-vertical': 'marqueeVertical 20s linear infinite', 
              'stamp-drop': 'stampDrop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'marking-strike': 'markingStrike 3s ease-in-out infinite',
              'marking-score': 'markingScore 3s ease-in-out infinite',
              'gradient-xy': 'gradientXY 3s ease infinite',
            },
            keyframes: {
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              wiggle: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
              typing: {
                '0%': { width: '0' },
                '60%': { width: '100%' }, 
                '100%': { width: '100%' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              marqueeReverse: {
                '0%': { transform: 'translateX(-50%)' },
                '100%': { transform: 'translateX(0)' },
              },
              marqueeVertical: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(-50%)' },
              },
              stampDrop: {
                '0%': { opacity: '0', transform: 'scale(3) rotate(-15deg)' },
                '100%': { opacity: '0.8', transform: 'scale(1) rotate(-12deg)' }, 
              },
              markingStrike: {
                '0%, 25%': { width: '0' },
                '35%, 85%': { width: '120%' },
                '95%, 100%': { width: '0' }
              },
              markingScore: {
                '0%, 30%': { opacity: '0', transform: 'scale(0.5) rotate(-10deg)' },
                '40%, 85%': { opacity: '1', transform: 'scale(1) rotate(-5deg)' },
                '95%, 100%': { opacity: '0' }
              },
              gradientXY: {
                  '0%, 100%': { 'background-size':'200% 200%', 'background-position': 'left center' },
                  '50%': { 'background-size':'200% 200%', 'background-position': 'right center' }
              }
            }
          }
        }
      }
